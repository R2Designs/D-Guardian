<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Design Guardian</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b100f;
        --bg-accent: radial-gradient(circle at top left, rgba(44, 212, 192, 0.14), transparent 32%);
        --surface: rgba(20, 27, 24, 0.94);
        --surface-strong: rgba(24, 31, 28, 0.98);
        --surface-alt: rgba(31, 40, 36, 0.98);
        --text: #edf3ef;
        --muted: #8d9a93;
        --line: rgba(237, 243, 239, 0.08);
        --accent: #22c7b6;
        --accent-strong: #159989;
        --accent-soft: rgba(34, 199, 182, 0.14);
        --warning: #ffab7a;
        --ok: #8af3e6;
        --ok-soft: rgba(34, 199, 182, 0.12);
        --shadow: 0 16px 34px rgba(0, 0, 0, 0.28);
        --card-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 10px;
        background: var(--bg-accent), linear-gradient(180deg, var(--bg), var(--bg));
        color: var(--text);
        font: 11px/1.4 "Avenir Next", "Segoe UI", sans-serif;
      }

      .panel {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .hero,
      .section,
      .error,
      .status {
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .hero {
        background: linear-gradient(180deg, var(--surface-strong), var(--surface));
        border-radius: 16px;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .eyebrow {
        margin: 0 0 4px;
        color: var(--muted);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        line-height: 1.05;
        letter-spacing: -0.04em;
      }

      .subcopy {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
      }

      .summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .summary-main {
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-width: 0;
        flex: 1;
      }

      .score {
        display: flex;
        align-items: baseline;
        gap: 7px;
        flex-wrap: wrap;
      }

      .score strong {
        font-size: 38px;
        line-height: 1;
        letter-spacing: -0.06em;
      }

      .score span,
      .meta,
      .checkbox-label span {
        color: var(--muted);
        font-size: 12px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 7px 10px;
        background: var(--accent-soft);
        color: var(--accent-strong);
        font-weight: 600;
        align-self: center;
      }

      .controls {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .actions {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      button {
        appearance: none;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--surface-strong);
        color: var(--text);
        padding: 8px 11px;
        font: inherit;
        cursor: pointer;
        transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease,
          background-color 140ms ease;
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
      }

      button.primary {
        border-color: var(--accent);
        background: linear-gradient(180deg, var(--accent), var(--accent-strong));
        color: #ffffff;
        box-shadow: 0 12px 22px rgba(15, 155, 142, 0.22);
      }

      button:disabled {
        cursor: default;
        opacity: 0.88;
        transform: none;
      }

      .button-inline {
        display: inline-flex;
        align-items: center;
        gap: 7px;
      }

      .spinner {
        width: 12px;
        height: 12px;
        border: 2px solid rgba(255, 255, 255, 0.28);
        border-top-color: #ffffff;
        border-radius: 999px;
        display: none;
        animation: spin 0.7s linear infinite;
      }

      .spinner.visible {
        display: inline-block;
      }

      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 10px;
        border-radius: 12px;
        background: var(--surface-alt);
        border: 1px solid var(--line);
      }

      .checkbox-label {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      input[type="checkbox"] {
        width: 14px;
        height: 14px;
        accent-color: var(--accent);
      }

      .error,
      .status {
        display: none;
        padding: 10px 11px;
        border-radius: 12px;
      }

      .error {
        background: rgba(194, 65, 12, 0.08);
        color: var(--warning);
      }

      .status {
        background: var(--ok-soft);
        color: var(--ok);
      }

      .error.visible,
      .status.visible {
        display: block;
      }

      .section {
        background: linear-gradient(180deg, var(--surface-strong), var(--surface));
        border-radius: 14px;
        overflow: hidden;
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 10px 12px 9px;
        border-bottom: 1px solid var(--line);
      }

      .section-head h2 {
        margin: 0;
        font-size: 12px;
        letter-spacing: 0.02em;
      }

      .count {
        min-width: 22px;
        text-align: center;
        padding: 2px 7px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--muted);
        font-weight: 600;
      }

      .issues {
        padding: 6px;
      }

      .issue,
      .empty {
        border-radius: 12px;
        background: var(--surface-alt);
        box-shadow: var(--card-shadow);
      }

      .issue {
        width: 100%;
        text-align: left;
        padding: 10px;
        margin-bottom: 6px;
        border: 1px solid transparent;
      }

      .issue:last-child {
        margin-bottom: 0;
      }

      .issue:hover {
        background: var(--accent-soft);
        border-color: var(--accent-soft);
      }

      .issue-title {
        margin: 0;
        font-size: 11px;
        font-weight: 600;
      }

      .issue-meta,
      .issue-detail,
      .empty,
      .footer {
        margin: 4px 0 0;
        color: var(--muted);
      }

      .issue-meta {
        font-size: 10px;
      }

      .empty {
        padding: 10px;
      }

      .footer {
        text-align: center;
        font-size: 10px;
      }

      .hero-top {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      @media (max-width: 360px) {
        .summary {
          flex-direction: column;
          align-items: flex-start;
        }

        .pill {
          align-self: flex-start;
        }
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }

        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <section class="hero">
        <div class="hero-top">
          <p class="eyebrow">Selected frame only</p>
          <h1>Design Guardian</h1>
          <p id="frame-name" class="subcopy">Select a frame to scan</p>
        </div>
        <div class="summary">
          <div class="summary-main">
            <div class="score">
              <strong id="issue-count">0</strong>
              <span>Issues Found</span>
            </div>
            <p id="summary-meta" class="meta">Typography, spacing, line height, and color styles.</p>
          </div>
          <div id="summary-pill" class="pill">Ready</div>
        </div>
        <div class="controls">
          <div class="actions">
            <button id="scan" class="primary">Scan Frame</button>
            <button id="resolve">
              <span class="button-inline">
                <span id="resolve-spinner" class="spinner"></span>
                <span id="resolve-label">Resolve All Issues</span>
              </span>
            </button>
            <button id="close">Close</button>
          </div>
          <div class="checkbox-row">
            <label class="checkbox-label" for="design-system">
              <input id="design-system" type="checkbox" />
              <span>Check with Design System</span>
            </label>
          </div>
        </div>
      </section>

      <div id="error-box" class="error"></div>
      <div id="status-box" class="status"></div>

      <section class="section">
        <div class="section-head">
          <h2>Typography Issues</h2>
          <span id="count-typography" class="count">0</span>
        </div>
        <div id="typography-list" class="issues"></div>
      </section>

      <section class="section">
        <div class="section-head">
          <h2>Spacing Issues</h2>
          <span id="count-spacing" class="count">0</span>
        </div>
        <div id="spacing-list" class="issues"></div>
      </section>

      <section class="section">
        <div class="section-head">
          <h2>Color Issues</h2>
          <span id="count-colors" class="count">0</span>
        </div>
        <div id="colors-list" class="issues"></div>
      </section>

      <div class="footer">Click any issue to select that layer inside Figma. Made with love by Raj</div>
    </div>

    <script>
      const categoryMap = {
        Typography: {
          list: document.getElementById("typography-list"),
          count: document.getElementById("count-typography")
        },
        Spacing: {
          list: document.getElementById("spacing-list"),
          count: document.getElementById("count-spacing")
        },
        Colors: {
          list: document.getElementById("colors-list"),
          count: document.getElementById("count-colors")
        }
      }

      function post(type, payload) {
        parent.postMessage({ pluginMessage: Object.assign({ type: type }, payload || {}) }, "*")
      }

      function setMessage(id, message, isVisible) {
        const element = document.getElementById(id)
        element.textContent = message
        element.classList.toggle("visible", isVisible)
      }

      function clearAlerts() {
        setMessage("error-box", "", false)
        setMessage("status-box", "", false)
      }

      function setResolving(isResolving) {
        const resolveButton = document.getElementById("resolve")
        const resolveLabel = document.getElementById("resolve-label")
        const resolveSpinner = document.getElementById("resolve-spinner")

        resolveButton.disabled = isResolving
        resolveButton.setAttribute("aria-busy", String(isResolving))
        resolveSpinner.classList.toggle("visible", isResolving)
        resolveLabel.textContent = isResolving ? "Resolving..." : "Resolve All Issues"
      }

      function setError(message) {
        setResolving(false)
        setMessage("status-box", "", false)
        setMessage("error-box", message, Boolean(message))
      }

      function setStatus(message) {
        setResolving(false)
        setMessage("error-box", "", false)
        setMessage("status-box", message, Boolean(message))
      }

      function createIssueButton(issue) {
        const button = document.createElement("button")
        button.className = "issue"
        button.type = "button"
        button.addEventListener("click", function () {
          post("select-node", { nodeId: issue.nodeId })
        })

        const title = document.createElement("p")
        title.className = "issue-title"
        title.textContent = issue.nodeName

        const meta = document.createElement("p")
        meta.className = "issue-meta"
        meta.textContent = issue.nodeType

        const detail = document.createElement("p")
        detail.className = "issue-detail"
        detail.textContent = issue.description

        button.appendChild(title)
        button.appendChild(meta)
        button.appendChild(detail)
        return button
      }

      function renderCategory(name, issues) {
        const target = categoryMap[name]
        target.count.textContent = String(issues.length)
        target.list.innerHTML = ""

        if (!issues.length) {
          const empty = document.createElement("p")
          empty.className = "empty"
          empty.textContent = "No issues found."
          target.list.appendChild(empty)
          return
        }

        issues.forEach(function (issue) {
          target.list.appendChild(createIssueButton(issue))
        })
      }

      function renderResults(result) {
        clearAlerts()
        document.getElementById("frame-name").textContent = result.frameName
        document.getElementById("issue-count").textContent = String(result.totalIssues)
        document.getElementById("summary-pill").textContent =
          result.totalIssues === 0 ? "Healthy" : result.totalIssues + " issues"
        document.getElementById("summary-meta").textContent =
          "Resolve duplicates the frame and applies Guardian cleanup to the copy only."

        renderCategory("Typography", result.issues.Typography)
        renderCategory("Spacing", result.issues.Spacing)
        renderCategory("Colors", result.issues.Colors)
      }

      document.getElementById("scan").addEventListener("click", function () {
        post("scan-frame")
      })

      document.getElementById("resolve").addEventListener("click", function () {
        const useDesignSystem = document.getElementById("design-system").checked
        setResolving(true)
        post("resolve-issues", { useDesignSystem: useDesignSystem })
      })

      document.getElementById("close").addEventListener("click", function () {
        post("close")
      })

      window.onmessage = function (event) {
        const message = event.data.pluginMessage
        if (!message) {
          return
        }

        if (message.type === "scan-results") {
          renderResults(message.result)
          return
        }

        if (message.type === "plugin-error") {
          setError(message.message)
          return
        }

        if (message.type === "plugin-status") {
          setStatus(message.message)
        }
      }
    </script>
  </body>
</html>
